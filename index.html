<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Ordini Magazzino</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background:#f5f5f5;
  margin:0;
}

/* TITOLI */
h2 { font-size:32px; margin-top:10px; }
h3 { font-size:26px; }

/* BOTTONI GRANDI */
button {
  font-size: 26px;
  padding: 22px;
  margin: 10px;
  width: 95%;
  border-radius:15px;
  border:none;
  background:#007bff;
  color:white;
}

/* BOTTONE SCAN */
.scan-btn {
  background:#28a745;
  font-size:30px;
}

/* BOTTONE STOP */
.stop-btn {
  background:#dc3545;
}

/* SCANNER GRANDE */
#reader {
  width: 100%;
  max-width: 600px;
  margin: 15px auto;
}

/* LISTA */
li {
  font-size:22px;
  margin:10px;
  background:white;
  padding:15px;
  border-radius:12px;
  list-style:none;
}

.small-btn {
  font-size:18px;
  padding:8px 12px;
  margin-left:10px;
  background:red;
}
</style>

</head>

<body>

<h2>📦 Ordini Magazzino</h2>

<button onclick="startCamera()">📷 Avvia Fotocamera</button> <button class="scan-btn" onclick="attivaScan()">🎯 SCANSIONA ORA</button> <button class="stop-btn" onclick="stopCamera()">⛔ Stop Camera</button> <button onclick="resetOrdine()">🗑️ Reset Ordine</button> <button onclick="fineOrdine()">✅ Fine Ordine</button>

<div id="reader"></div>

<h3>Lista ordine</h3>
<ul id="lista"></ul>

<script>

// 📦 DATABASE
let prodotti = {
"NS E4TE1SMK-F41": { descrizione:"Finecorsa sicurezza", codiceInterno:"6274", tipo:"C"},
"CA12PD0M": { descrizione:"Cavo 12m", codiceInterno:"6275", tipo:"C"}
};

// 📦 ORDINE
let ordine = JSON.parse(localStorage.getItem("ordine")) || {};
aggiornaLista();

// 📷 CAMERA
let scanner;
let scanAttivo = false;

function startCamera() {

  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 350, height: 350 } },

    (codice) => {

      // 👇 SE NON HO PREMUTO SCANSIONA → IGNORA
      if (!scanAttivo) return;

      scanAttivo = false;

      let codicePulito = codice.trim().toUpperCase();

      if (!prodotti[codicePulito]) {
        alert("❌ Non trovato: " + codicePulito);
        return;
      }

      let qty = parseInt(prompt("Quantità per " + codicePulito));

      if (isNaN(qty) || qty <= 0) {
        alert("Quantità non valida");
        return;
      }

      ordine[codicePulito] = (ordine[codicePulito] || 0) + qty;

      salvaOrdine();
      aggiornaLista();

      if (navigator.vibrate) navigator.vibrate(200);
      new Audio("https://www.soundjay.com/buttons/beep-07.wav").play();
    }
  );
}

// 🎯 ATTIVA SCANSIONE
function attivaScan() {
  scanAttivo = true;
}

// ⛔ STOP CAMERA
function stopCamera() {
  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      scanner = null;
    });
  }
}

// 📊 LISTA
function aggiornaLista() {
  let ul = document.getElementById("lista");
  ul.innerHTML = "";

  for (let cod in ordine) {
    let li = document.createElement("li");

    li.innerHTML = `
      <b>${cod}</b> → ${ordine[cod]}
      <button class="small-btn" onclick="rimuovi('${cod}')">❌</button>
    `;

    ul.appendChild(li);
  }
}

// ❌ RIMUOVI
function rimuovi(cod) {
  delete ordine[cod];
  salvaOrdine();
  aggiornaLista();
}

// 🗑️ RESET
function resetOrdine() {
  if (!confirm("Vuoi cancellare tutto?")) return;
  ordine = {};
  salvaOrdine();
  aggiornaLista();
}

// 💾 SALVA
function salvaOrdine() {
  localStorage.setItem("ordine", JSON.stringify(ordine));
}

// ✅ FINE ORDINE
function fineOrdine() {

  if (Object.keys(ordine).length === 0) {
    alert("Ordine vuoto!");
    return;
  }

  let dati = [];

  for (let cod in ordine) {
    let p = prodotti[cod];

    dati.push({
      "Descrizione": p.descrizione,
      "Q.ta": ordine[cod],
      "CODICE": cod,
      "CODICE INTERNO": p.codiceInterno,
      "Tipo": p.tipo
    });
  }

  if (confirm("Salvare Excel?")) generaExcel(dati);
  if (confirm("Inviare WhatsApp?")) inviaWhatsApp(dati);
}

// 📊 EXCEL
function generaExcel(dati) {
  let ws = XLSX.utils.json_to_sheet(dati);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Ordine");
  XLSX.writeFile(wb, "ordine.xlsx");
}

// 📤 WHATSAPP
function inviaWhatsApp(dati) {
  let testo = dati.map(d =>
    `${d.CODICE} - ${d["Q.ta"]}`
  ).join("%0A");

  window.open(`https://wa.me/?text=${testo}`);
}

</script>

</body>
</html>
