// 📦 ORDINE
let ordine = JSON.parse(localStorage.getItem("ordine")) || {};

// 📷 SCANNER
let scanner;
let scanAttivo = false;

function startScanner() {

  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 350, height: 350 } },

    (codice) => {

      // 👉 legge SOLO se premi SCANSIONA
      if (!scanAttivo) return;
      scanAttivo = false;

      // 🛑 STOP dopo lettura
      scanner.stop().then(() => {
        scanner.clear();
        scanner = null;

        let codicePulito = codice.trim().toUpperCase();

        if (!prodotti[codicePulito]) {
          alert("❌ Prodotto non trovato: " + codicePulito);
          return;
        }

        let qty = parseInt(prompt("Quantità per " + codicePulito));

        if (isNaN(qty) || qty <= 0) {
          alert("Quantità non valida");
          return;
        }

        ordine[codicePulito] = (ordine[codicePulito] || 0) + qty;

        salvaOrdine();
        aggiornaLista();

        if (navigator.vibrate) navigator.vibrate(200);
        new Audio("https://www.soundjay.com/buttons/beep-07.wav").play();

        // 🔁 RIAVVIO AUTOMATICO
        setTimeout(() => startScanner(), 500);
      });
    }
  );
}

// 🎯 ATTIVA SCANSIONE
function attivaScan() {
  scanAttivo = true;
}

// 📊 LISTA
function aggiornaLista() {
  let ul = document.getElementById("lista");
  ul.innerHTML = "";

  for (let cod in ordine) {
    let li = document.createElement("li");

    li.innerHTML = `
      <b>${cod}</b> → ${ordine[cod]}
      <button class="small-btn" onclick="rimuovi('${cod}')">❌</button>
    `;

    ul.appendChild(li);
  }
}

// ❌ RIMUOVI
function rimuovi(cod) {
  delete ordine[cod];
  salvaOrdine();
  aggiornaLista();
}

// 🗑️ RESET
function resetOrdine() {
  if (!confirm("Vuoi cancellare tutto l'ordine?")) return;
  ordine = {};
  salvaOrdine();
  aggiornaLista();
}

// 💾 SALVA
function salvaOrdine() {
  localStorage.setItem("ordine", JSON.stringify(ordine));
}

// ✅ FINE ORDINE
function fineOrdine() {

  if (Object.keys(ordine).length === 0) {
    alert("Ordine vuoto!");
    return;
  }

  let dati = [];

  for (let cod in ordine) {
    let p = prodotti[cod];

    dati.push({
      "Descrizione": p.descrizione,
      "Q.ta": ordine[cod],
      "CODICE": cod,
      "CODICE INTERNO": p.codiceInterno,
      "Tipo": p.tipo
    });
  }

  if (confirm("Vuoi salvare l'Excel?")) {
    generaExcel(dati);
  }

  if (confirm("Vuoi inviare su WhatsApp?")) {
    inviaWhatsApp(dati);
  }
}

// 📊 EXCEL
function generaExcel(dati) {
  let ws = XLSX.utils.json_to_sheet(dati);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Ordine");
  XLSX.writeFile(wb, "ordine_" + new Date().toISOString() + ".xlsx");
}

// 📤 WHATSAPP
function inviaWhatsApp(dati) {
  let testo = dati.map(d =>
    `${d.Descrizione}\nCod: ${d.CODICE}\nQta: ${d["Q.ta"]}\n`
  ).join("%0A");

  window.open(`https://wa.me/?text=${testo}`);
}
