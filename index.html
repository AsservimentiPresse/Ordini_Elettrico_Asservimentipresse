<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Ordini Magazzino</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background:#f5f5f5;
  margin:0;
}

/* TITOLI */
h2 { font-size:32px; }
h3 { font-size:26px; }

/* BOTTONI */
button {
  font-size: 26px;
  padding: 22px;
  margin: 10px;
  width: 95%;
  border-radius:15px;
  border:none;
  background:#007bff;
  color:white;
}

.scan-btn { background:#28a745; font-size:30px; }
.stop-btn { background:#dc3545; }

/* SCANNER */
#reader {
  width: 100%;
  max-width: 600px;
  margin: 15px auto;
}

/* LISTA */
li {
  font-size:22px;
  margin:10px;
  background:white;
  padding:15px;
  border-radius:12px;
  list-style:none;
}

.small-btn {
  font-size:18px;
  padding:8px 12px;
  margin-left:10px;
  background:red;
}

/* POPUP */
#popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

#popupBox {
  background:white;
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

#popupBox input {
  font-size:28px;
  width:100%;
  padding:10px;
  margin:15px 0;
  text-align:center;
}
</style>

</head>

<body>

<h2>📦 Ordini Magazzino</h2>

<button onclick="startCamera()">📷 Avvia Fotocamera</button> <button class="scan-btn" onclick="attivaScan()">🎯 SCANSIONA ORA</button> <button class="stop-btn" onclick="stopCamera()">⛔ Stop Camera</button> <button onclick="resetOrdine()">🗑️ Reset Ordine</button> <button onclick="fineOrdine()">✅ Fine Ordine</button>

<div id="reader"></div>

<h3>Lista ordine</h3>
<ul id="lista"></ul>

<!-- POPUP -->

<div id="popup">
  <div id="popupBox">
    <h3 id="titoloPopup"></h3>
    <input type="number" id="qtyInput" placeholder="Quantità">
    <button onclick="confermaQty()">✅ Conferma</button>
    <button onclick="chiudiPopup()">❌ Annulla</button>
  </div>
</div>

<script>

// 📦 DATABASE
let prodotti = {
"NS E4TE1SMK-F41": { descrizione:"Finecorsa sicurezza", codiceInterno:"6274", tipo:"C"},
"CA12PD0M": { descrizione:"Cavo 12m", codiceInterno:"6275", tipo:"C"}
};

// 📦 ORDINE
let ordine = JSON.parse(localStorage.getItem("ordine")) || {};
aggiornaLista();

let scanner;
let scanAttivo = false;
let codiceCorrente = null;

// 📷 CAMERA
function startCamera() {

  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 350, height: 350 } },

    (codice) => {

      if (!scanAttivo) return;
      scanAttivo = false;

      codiceCorrente = codice.trim().toUpperCase();

      if (!prodotti[codiceCorrente]) {
        alert("❌ Non trovato: " + codiceCorrente);
        return;
      }

      apriPopup(codiceCorrente);
    }
  );
}

// 🎯 ATTIVA SCAN
function attivaScan() {
  scanAttivo = true;
}

// ⛔ STOP CAMERA
function stopCamera() {
  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      scanner = null;
    });
  }
}

// 📦 POPUP
function apriPopup(cod) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("titoloPopup").innerText = cod;
  document.getElementById("qtyInput").value = "";
}

// ❌ CHIUDI
function chiudiPopup() {
  document.getElementById("popup").style.display = "none";
}

// ✅ CONFERMA QTA
function confermaQty() {

  let qty = parseInt(document.getElementById("qtyInput").value);

  if (isNaN(qty) || qty <= 0) {
    alert("Quantità non valida");
    return;
  }

  ordine[codiceCorrente] = (ordine[codiceCorrente] || 0) + qty;

  salvaOrdine();
  aggiornaLista();
  chiudiPopup();

  if (navigator.vibrate) navigator.vibrate(200);

  // 🔁 RIAVVIO CAMERA AUTOMATICO
  stopCamera();
  setTimeout(() => startCamera(), 500);
}

// 📊 LISTA
function aggiornaLista() {
  let ul = document.getElementById("lista");
  ul.innerHTML = "";

  for (let cod in ordine) {
    let li = document.createElement("li");

    li.innerHTML = `
      <b>${cod}</b> → ${ordine[cod]}
      <button class="small-btn" onclick="rimuovi('${cod}')">❌</button>
    `;

    ul.appendChild(li);
  }
}

// ❌ RIMUOVI
function rimuovi(cod) {
  delete ordine[cod];
  salvaOrdine();
  aggiornaLista();
}

// 🗑️ RESET
function resetOrdine() {
  if (!confirm("Vuoi cancellare tutto?")) return;
  ordine = {};
  salvaOrdine();
  aggiornaLista();
}

// 💾 SALVA
function salvaOrdine() {
  localStorage.setItem("ordine", JSON.stringify(ordine));
}

// ✅ FINE ORDINE
function fineOrdine() {

  if (Object.keys(ordine).length === 0) {
    alert("Ordine vuoto!");
    return;
  }

  let dati = [];

  for (let cod in ordine) {
    let p = prodotti[cod];

    dati.push({
      "Descrizione": p.descrizione,
      "Q.ta": ordine[cod],
      "CODICE": cod,
      "CODICE INTERNO": p.codiceInterno,
      "Tipo": p.tipo
    });
  }

  if (confirm("Salvare Excel?")) generaExcel(dati);
  if (confirm("Inviare WhatsApp?")) inviaWhatsApp(dati);
}

// 📊 EXCEL
function generaExcel(dati) {
  let ws = XLSX.utils.json_to_sheet(dati);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Ordine");
  XLSX.writeFile(wb, "ordine.xlsx");
}

// 📤 WHATSAPP
function inviaWhatsApp(dati) {
  let testo = dati.map(d =>
    `${d.CODICE} - ${d["Q.ta"]}`
  ).join("%0A");

  window.open(`https://wa.me/?text=${testo}`);
}

</script>

</body>
</html>
